<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>麥當勞套餐推薦系統</title>
  <style>
    :root {
      --bg: #180904;
      --panel: rgba(58, 20, 8, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --accent: #ffbc0d;
      --text: #fff7e6;
      --muted: #f4d3a1;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      --glow: 0 0 0 1px rgba(255, 216, 91, 0.22), 0 12px 30px rgba(255, 164, 31, 0.16);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 188, 13, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 98, 40, 0.18), transparent 28%),
        linear-gradient(135deg, #120704 0%, #220d07 45%, #0d0604 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1160px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .panel {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 224, 143, 0.14);
      box-shadow: var(--shadow);
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hero {
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(255, 188, 13, 0.18), rgba(255, 77, 50, 0.12)),
        rgba(39, 14, 7, 0.92);
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      letter-spacing: 0.02em;
    }

    .subhead {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .panel-header,
    .panel-body {
      padding: 22px;
    }

    .panel-header {
      padding-bottom: 0;
    }

    .panel-title {
      font-size: 1.15rem;
      color: #fff3d1;
    }

    .toolbar,
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar {
      margin-bottom: 18px;
    }

    .actions {
      margin-bottom: 18px;
    }

    .selected-pill {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffe8b7;
      font-weight: 700;
    }

    .items-grid,
    .combo-grid {
      display: grid;
      gap: 14px;
    }

    .items-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .combo-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .item-card,
    .combo-card {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-soft);
      transition: transform var(--transition), filter var(--transition), border-color var(--transition);
    }

    .item-card {
      cursor: pointer;
      padding: 14px 12px 16px;
      text-align: center;
      min-height: 156px;
    }

    .item-card:hover,
    .combo-card:hover,
    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .item-card.selected,
    .combo-card.featured {
      background: linear-gradient(180deg, rgba(255, 218, 97, 0.18), rgba(255, 125, 29, 0.14));
      border-color: rgba(255, 209, 92, 0.78);
      box-shadow: var(--glow);
    }

    .item-image-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 72px;
      margin-bottom: 10px;
    }

    .item-image {
      max-width: 76px;
      max-height: 76px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.24));
    }

    .item-name {
      font-size: 0.98rem;
      font-weight: 800;
      color: #fff7de;
      line-height: 1.35;
    }

    .item-subtext {
      margin-top: 8px;
      color: #ffe7b3;
      font-weight: 700;
      font-size: 0.86rem;
    }

    .combo-card {
      padding: 18px;
    }

    .combo-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .combo-title {
      font-size: 1.02rem;
      color: #fff7de;
      font-weight: 800;
      line-height: 1.4;
    }

    .combo-price {
      color: #ffd05f;
      font-weight: 900;
      white-space: nowrap;
      font-size: 0.92rem;
    }

    .combo-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tag {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffebbd;
      font-size: 0.85rem;
    }

    .combo-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 13px 18px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 0.96rem;
      transition: transform var(--transition), filter var(--transition);
    }

    .btn-primary {
      color: #4c2000;
      background: linear-gradient(180deg, #fff2b8 0%, #ffbc0d 52%, #e28a00 100%);
    }

    .btn-secondary {
      color: #fff4df;
      background: linear-gradient(180deg, #7d3218 0%, #4c1e0f 100%);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: none;
      transform: none;
    }

    .empty-state {
      padding: 18px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .items-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .combo-grid {
        grid-template-columns: 1fr;
      }

      .items-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar,
      .actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section id="selectionScreen" class="screen active">
      <section class="panel hero">
        <h1>請選擇想吃的品項</h1>
        <p class="subhead">可複選，完成後再進入下一步</p>
      </section>

      <div class="toolbar">
        <div class="selected-pill">已選 <span id="selectedCount">0</span> 項</div>
        <button class="btn btn-primary" id="nextButton" type="button" disabled>確認選擇</button>
      </div>

      <section class="panel">
        <div class="panel-body">
          <div id="itemsGrid" class="items-grid"></div>
        </div>
      </section>
    </section>

    <section id="comboScreen" class="screen">
      <div class="toolbar">
        <div class="selected-pill">已選品項：<span id="selectedItemsText">-</span></div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">推薦套餐</h2>
        </div>
        <div class="panel-body">
          <div class="actions">
            <button class="btn btn-secondary" id="backButton" type="button">返回</button>
            <button class="btn btn-primary" id="resetButton" type="button">重新選擇</button>
          </div>
          <div id="comboResults" class="combo-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const friesSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="fry" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#ffe897"/>
            <stop offset="100%" stop-color="#f5ba30"/>
          </linearGradient>
          <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#ff2b31"/>
            <stop offset="100%" stop-color="#d10915"/>
          </linearGradient>
        </defs>
        <g transform="translate(28 20)">
          <rect x="20" y="10" width="18" height="94" rx="8" fill="url(#fry)" transform="rotate(-6 29 57)"/>
          <rect x="38" y="2" width="18" height="106" rx="8" fill="url(#fry)" transform="rotate(2 47 55)"/>
          <rect x="58" y="14" width="18" height="92" rx="8" fill="url(#fry)" transform="rotate(-2 67 60)"/>
          <rect x="78" y="4" width="18" height="108" rx="8" fill="url(#fry)" transform="rotate(5 87 58)"/>
          <rect x="98" y="18" width="18" height="88" rx="8" fill="url(#fry)" transform="rotate(-3 107 62)"/>
          <rect x="118" y="0" width="18" height="108" rx="8" fill="url(#fry)" transform="rotate(7 127 54)"/>
          <rect x="138" y="14" width="18" height="92" rx="8" fill="url(#fry)" transform="rotate(-5 147 60)"/>
          <path d="M10 82 C42 58, 122 58, 154 82 L144 170 C128 182, 34 182, 18 170 Z" fill="url(#box)"/>
          <path d="M42 120 C58 106, 104 106, 120 120" fill="none" stroke="#ffcf17" stroke-width="8" stroke-linecap="round"/>
          <path d="M42 120 C42 102, 55 92, 67 92 C78 92, 88 102, 88 120" fill="none" stroke="#ffcf17" stroke-width="8" stroke-linecap="round"/>
          <path d="M74 120 C74 102, 87 92, 99 92 C110 92, 120 102, 120 120" fill="none" stroke="#ffcf17" stroke-width="8" stroke-linecap="round"/>
        </g>
      </svg>
    `);

    const burgerSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="152" rx="78" ry="20" fill="#482314" opacity=".22"/>
        <path d="M50 96 C58 54, 162 54, 170 96 Z" fill="#f0b34a"/>
        <circle cx="82" cy="77" r="4" fill="#fff2bc"/>
        <circle cx="102" cy="69" r="4" fill="#fff2bc"/>
        <circle cx="122" cy="76" r="4" fill="#fff2bc"/>
        <circle cx="142" cy="69" r="4" fill="#fff2bc"/>
        <rect x="48" y="96" width="124" height="10" rx="5" fill="#5d311c"/>
        <rect x="44" y="106" width="132" height="16" rx="8" fill="#6b3e20"/>
        <rect x="50" y="118" width="120" height="10" rx="5" fill="#ffd93f"/>
        <rect x="48" y="128" width="124" height="11" rx="5" fill="#72a23a"/>
        <rect x="54" y="139" width="112" height="18" rx="9" fill="#e1a04d"/>
      </svg>
    `);

    const nuggetsSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="162" rx="76" ry="18" fill="#482314" opacity=".2"/>
        <rect x="54" y="110" width="112" height="46" rx="10" fill="#cf1318"/>
        <rect x="50" y="98" width="120" height="24" rx="10" fill="#f8f2db"/>
        <path d="M66 54 C76 42, 96 42, 102 58 C114 42, 136 45, 142 61 C150 56, 164 60, 168 74 C172 88, 160 101, 145 101 H84 C66 101, 55 88, 57 74 C59 63, 65 58, 66 54 Z" fill="#e8b256"/>
      </svg>
    `);

    const colaSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="170" rx="62" ry="16" fill="#482314" opacity=".2"/>
        <path d="M78 40 H142 L132 156 C131 166, 124 174, 110 174 C96 174, 89 166, 88 156 Z" fill="#d91d24"/>
        <path d="M80 56 H140" stroke="#fff5da" stroke-width="8" stroke-linecap="round"/>
        <path d="M100 28 H144" stroke="#ffe897" stroke-width="8" stroke-linecap="round"/>
        <path d="M144 28 L128 54" stroke="#ffe897" stroke-width="8" stroke-linecap="round"/>
      </svg>
    `);

    const pieSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="164" rx="72" ry="18" fill="#482314" opacity=".2"/>
        <path d="M56 118 L108 58 L164 112 L114 162 Z" fill="#e5a147"/>
        <path d="M66 118 L108 76 L152 112 L112 150 Z" fill="#f8c45c"/>
      </svg>
    `);

    const saladSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="162" rx="72" ry="18" fill="#482314" opacity=".18"/>
        <path d="M54 118 C62 152, 158 152, 166 118 Z" fill="#f4f0e7"/>
        <circle cx="88" cy="103" r="24" fill="#7fc34b"/>
        <circle cx="118" cy="98" r="22" fill="#9bd25c"/>
        <circle cx="136" cy="118" r="20" fill="#6fb13f"/>
        <circle cx="94" cy="126" r="18" fill="#b3db6a"/>
      </svg>
    `);

    const chickenSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="164" rx="72" ry="18" fill="#482314" opacity=".2"/>
        <path d="M78 62 C92 48, 118 48, 132 62 C147 77, 148 111, 130 132 C113 151, 88 150, 72 132 C55 113, 58 80, 78 62 Z" fill="#d79a44"/>
        <circle cx="71" cy="55" r="12" fill="#f3ece2"/>
        <circle cx="145" cy="55" r="12" fill="#f3ece2"/>
      </svg>
    `);

    const fishSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="152" rx="78" ry="20" fill="#482314" opacity=".22"/>
        <path d="M50 96 C58 54, 162 54, 170 96 Z" fill="#f0b34a"/>
        <rect x="48" y="104" width="124" height="11" rx="5" fill="#64a9d8"/>
        <rect x="46" y="116" width="128" height="15" rx="7" fill="#f7d070"/>
        <rect x="48" y="131" width="124" height="10" rx="5" fill="#72a23a"/>
        <rect x="54" y="141" width="112" height="16" rx="8" fill="#e1a04d"/>
      </svg>
    `);

    const beefDeluxeSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <ellipse cx="110" cy="152" rx="78" ry="20" fill="#482314" opacity=".22"/>
        <path d="M48 94 C58 50, 162 50, 172 94 Z" fill="#efb24a"/>
        <rect x="48" y="98" width="124" height="10" rx="5" fill="#5d311c"/>
        <rect x="46" y="110" width="128" height="12" rx="6" fill="#7e4b27"/>
        <rect x="48" y="123" width="124" height="9" rx="4" fill="#ffd93f"/>
        <rect x="47" y="134" width="126" height="9" rx="4" fill="#72a23a"/>
        <rect x="54" y="144" width="112" height="15" rx="8" fill="#e1a04d"/>
      </svg>
    `);

    const products = [
      { id: "big-mac", name: "大麥克®", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "double-cheese-beef", name: "雙層牛肉吉事堡", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "quarter-pounder", name: "四盎司牛肉堡", image: `data:image/svg+xml;charset=UTF-8,${beefDeluxeSvg}`, subtitle: "超值全餐" },
      { id: "double-quarter-pounder", name: "雙層四盎司牛肉堡", image: `data:image/svg+xml;charset=UTF-8,${beefDeluxeSvg}`, subtitle: "超值全餐" },
      { id: "mcchicken", name: "麥香鷄®", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "double-mcchicken", name: "雙層麥香鷄", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "grilled-chicken", name: "嫩煎鷄腿堡", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "nuggets-6", name: "麥克鷄塊®(6塊)", image: `data:image/svg+xml;charset=UTF-8,${nuggetsSvg}`, subtitle: "超值全餐" },
      { id: "nuggets-10", name: "麥克鷄塊®(10塊)", image: `data:image/svg+xml;charset=UTF-8,${nuggetsSvg}`, subtitle: "超值全餐" },
      { id: "spicy-chicken", name: "勁辣鷄腿堡", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "crispy-original", name: "原味麥脆鷄腿(2塊)", image: `data:image/svg+xml;charset=UTF-8,${chickenSvg}`, subtitle: "超值全餐" },
      { id: "crispy-spicy", name: "辣味麥脆鷄腿(2塊)", image: `data:image/svg+xml;charset=UTF-8,${chickenSvg}`, subtitle: "超值全餐" },
      { id: "filet-o-fish", name: "麥香魚®", image: `data:image/svg+xml;charset=UTF-8,${fishSvg}`, subtitle: "超值全餐" },
      { id: "blt-angus", name: "BLT 安格斯牛肉堡", image: `data:image/svg+xml;charset=UTF-8,${beefDeluxeSvg}`, subtitle: "超值全餐" },
      { id: "blt-chicken", name: "BLT 嫩煎鷄腿堡", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "parmesan-angus", name: "帕瑪森安格斯牛肉堡", image: `data:image/svg+xml;charset=UTF-8,${beefDeluxeSvg}`, subtitle: "超值全餐" },
      { id: "parmesan-chicken", name: "帕瑪森主廚鷄腿堡", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "mushroom-angus", name: "蕈菇安格斯牛肉堡", image: `data:image/svg+xml;charset=UTF-8,${beefDeluxeSvg}`, subtitle: "超值全餐" },
      { id: "mushroom-chicken", name: "蕈菇主廚鷄腿堡", image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}`, subtitle: "超值全餐" },
      { id: "quinoa-salad", name: "藜麥沙拉", image: `data:image/svg+xml;charset=UTF-8,${saladSvg}`, subtitle: "超值全餐" },
      { id: "quinoa-fish-salad", name: "藜麥鱈魚沙拉", image: `data:image/svg+xml;charset=UTF-8,${saladSvg}`, subtitle: "超值全餐" },
      { id: "quinoa-chicken-salad", name: "藜麥烤鷄沙拉", image: `data:image/svg+xml;charset=UTF-8,${saladSvg}`, subtitle: "超值全餐" },
      { id: "quinoa-spicy-salad", name: "藜麥辣脆鷄沙拉", image: `data:image/svg+xml;charset=UTF-8,${saladSvg}`, subtitle: "超值全餐" }
    ];

    const mealOptions = [
      { id: "classic", name: "經典配餐", items: ["中薯", "$38 冷/熱飲"] },
      { id: "fresh", name: "清爽配餐", items: ["四季沙拉", "$38 冷/熱飲"] },
      { id: "crispy", name: "勁脆配餐", items: ["麥脆鷄腿一塊", "$38 冷/熱飲"] },
      { id: "mcflurry", name: "炫冰配餐", items: ["OREO 冰炫風", "小薯", "$38 冷/熱飲"] },
      { id: "hearty", name: "豪吃配餐", items: ["6塊麥克鷄塊", "小薯", "$38 冷/熱飲"] }
    ];

    const state = {
      selectedProductIds: new Set()
    };

    const elements = {
      selectedCount: document.getElementById("selectedCount"),
      nextButton: document.getElementById("nextButton"),
      itemsGrid: document.getElementById("itemsGrid"),
      comboResults: document.getElementById("comboResults"),
      selectedItemsText: document.getElementById("selectedItemsText"),
      backButton: document.getElementById("backButton"),
      resetButton: document.getElementById("resetButton"),
      selectionScreen: document.getElementById("selectionScreen"),
      comboScreen: document.getElementById("comboScreen")
    };

    function getSelectedProducts() {
      return products.filter((product) => state.selectedProductIds.has(product.id));
    }

    function renderProducts() {
      elements.itemsGrid.innerHTML = products.map((product) => `
        <button class="item-card ${state.selectedProductIds.has(product.id) ? "selected" : ""}" type="button" data-product-id="${product.id}">
          <div class="item-image-wrap">
            <img class="item-image" src="${product.image}" alt="${product.name}">
          </div>
          <div class="item-name">${product.name}</div>
          <div class="item-subtext">${product.subtitle}</div>
        </button>
      `).join("");
    }

    function buildComboCards() {
      return getSelectedProducts().flatMap((product) =>
        mealOptions.map((option) => ({
          id: `${product.id}-${option.id}`,
          title: `${product.name} + ${option.name}`,
          note: "價格依各地區麥當勞餐廳價目表供應為準",
          priceLabel: "門市價",
          tags: [product.name, ...option.items]
        }))
      );
    }

    function renderCombos() {
      const comboCards = buildComboCards();
      const selectedNames = getSelectedProducts().map((product) => product.name);
      elements.selectedItemsText.textContent = selectedNames.length ? selectedNames.join("、") : "-";

      if (comboCards.length === 0) {
        elements.comboResults.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">請先選擇品項</div>';
        return;
      }

      elements.comboResults.innerHTML = comboCards.map((combo, index) => `
        <article class="combo-card ${index === 0 ? "featured" : ""}">
          <div class="combo-top">
            <div class="combo-title">${combo.title}</div>
            <div class="combo-price">${combo.priceLabel}</div>
          </div>
          <div class="combo-tags">
            ${combo.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
          <div class="combo-note">${combo.note}</div>
        </article>
      `).join("");
    }

    function updateSelectionSummary() {
      elements.selectedCount.textContent = state.selectedProductIds.size;
      elements.nextButton.disabled = state.selectedProductIds.size === 0;
    }

    function showScreen(screenName) {
      elements.selectionScreen.classList.toggle("active", screenName === "selection");
      elements.comboScreen.classList.toggle("active", screenName === "combo");
    }

    function toggleProduct(productId) {
      if (state.selectedProductIds.has(productId)) {
        state.selectedProductIds.delete(productId);
      } else {
        state.selectedProductIds.add(productId);
      }

      renderProducts();
      updateSelectionSummary();
      bindSelectionEvents();
    }

    function goToComboScreen() {
      renderCombos();
      showScreen("combo");
    }

    function resetAll() {
      state.selectedProductIds.clear();
      renderProducts();
      updateSelectionSummary();
      bindSelectionEvents();
      showScreen("selection");
    }

    function bindSelectionEvents() {
      document.querySelectorAll("[data-product-id]").forEach((button) => {
        button.addEventListener("click", () => {
          toggleProduct(button.dataset.productId);
        });
      });
    }

    function bindGlobalEvents() {
      elements.nextButton.addEventListener("click", goToComboScreen);
      elements.backButton.addEventListener("click", () => showScreen("selection"));
      elements.resetButton.addEventListener("click", resetAll);
    }

    function init() {
      renderProducts();
      updateSelectionSummary();
      bindSelectionEvents();
      bindGlobalEvents();
      showScreen("selection");
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>麥當勞套餐推薦系統</title>
  <style>
    :root {
      --bg: #170803;
      --panel: rgba(52, 19, 8, 0.9);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --accent: #ffbc0d;
      --accent-strong: #ff8b00;
      --text: #fff7e6;
      --muted: #f4d3a1;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      --glow: 0 0 0 1px rgba(255, 216, 91, 0.22), 0 12px 30px rgba(255, 164, 31, 0.16);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 188, 13, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 98, 40, 0.18), transparent 28%),
        linear-gradient(135deg, #120704 0%, #220d07 45%, #0d0604 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .panel {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 224, 143, 0.14);
      box-shadow: var(--shadow);
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hero {
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(255, 188, 13, 0.18), rgba(255, 77, 50, 0.12)),
        rgba(39, 14, 7, 0.92);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.02em;
    }

    .subhead {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .panel-header,
    .panel-body {
      padding: 22px;
    }

    .panel-header {
      padding-bottom: 0;
    }

    .panel-title {
      font-size: 1.15rem;
      color: #fff3d1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .visit-box,
    .selected-box {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffe8b7;
      font-weight: 700;
    }

    .items-grid,
    .combo-grid {
      display: grid;
      gap: 14px;
    }

    .items-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .combo-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .item-card,
    .combo-card {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-soft);
      transition: transform var(--transition), filter var(--transition), border-color var(--transition);
    }

    .item-card {
      cursor: pointer;
      padding: 18px 14px;
      min-height: 118px;
      text-align: center;
    }

    .item-card:hover,
    .combo-card:hover,
    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .item-card.selected,
    .combo-card.featured {
      background: linear-gradient(180deg, rgba(255, 218, 97, 0.18), rgba(255, 125, 29, 0.14));
      border-color: rgba(255, 209, 92, 0.78);
      box-shadow: var(--glow);
    }

    .item-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
      line-height: 1;
    }

    .item-name {
      font-size: 1.02rem;
      font-weight: 800;
      color: #fff7de;
    }

    .item-price {
      margin-top: 8px;
      color: #ffe7b3;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .combo-card {
      padding: 18px;
    }

    .combo-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .combo-title {
      font-size: 1.04rem;
      color: #fff7de;
      font-weight: 800;
    }

    .combo-price {
      color: #ffd05f;
      font-weight: 900;
      white-space: nowrap;
    }

    .combo-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tag {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffebbd;
      font-size: 0.88rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 13px 18px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 0.96rem;
      transition: transform var(--transition), filter var(--transition);
    }

    .btn-primary {
      color: #4c2000;
      background: linear-gradient(180deg, #fff2b8 0%, #ffbc0d 52%, #e28a00 100%);
    }

    .btn-secondary {
      color: #fff4df;
      background: linear-gradient(180deg, #7d3218 0%, #4c1e0f 100%);
    }

    .empty-state {
      padding: 18px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      .items-grid,
      .combo-grid {
        grid-template-columns: 1fr;
      }

      .topbar,
      .actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section id="selectionScreen" class="screen active">
      <section class="panel hero">
        <h1>請選擇想吃的品項</h1>
        <p class="subhead">點選後直接查看相關套餐</p>
      </section>

      <div class="topbar">
        <div class="visit-box">累積進入網站人次：<span id="visitCount">0</span></div>
      </div>

      <section class="panel">
        <div class="panel-body">
          <div id="itemsGrid" class="items-grid"></div>
        </div>
      </section>
    </section>

    <section id="comboScreen" class="screen">
      <div class="topbar">
        <div class="selected-box">已選品項：<span id="selectedItemName">-</span></div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">推薦套餐</h2>
        </div>
        <div class="panel-body">
          <div class="actions">
            <button class="btn btn-secondary" id="backButton" type="button">返回</button>
            <button class="btn btn-primary" id="clearButton" type="button">重新選擇</button>
          </div>
          <div id="comboResults" class="combo-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const products = [
      { id: "nuggets", name: "麥克雞塊", price: 99, icon: "🍗" },
      { id: "big-mac", name: "大麥克", price: 75, icon: "🍔" },
      { id: "spicy-chicken", name: "勁辣雞腿堡", price: 85, icon: "🌶" },
      { id: "fries", name: "薯條", price: 55, icon: "🍟" },
      { id: "cola", name: "可樂", price: 38, icon: "🥤" },
      { id: "apple-pie", name: "蘋果派", price: 38, icon: "🥧" }
    ];

    const comboCatalog = [
      { id: "combo-nuggets-classic", title: "雞塊經典套餐", price: 192, items: ["nuggets", "fries", "cola"], tag: "熱門" },
      { id: "combo-nuggets-share", title: "雞塊加量分享餐", price: 237, items: ["nuggets", "cola", "apple-pie"], tag: "加量" },
      { id: "combo-nuggets-light", title: "雞塊輕鬆配", price: 137, items: ["nuggets", "cola"], tag: "輕鬆" },
      { id: "combo-bigmac-classic", title: "大麥克經典套餐", price: 168, items: ["big-mac", "fries", "cola"], tag: "招牌" },
      { id: "combo-bigmac-snack", title: "大麥克點心餐", price: 113, items: ["big-mac", "cola"], tag: "簡單" },
      { id: "combo-spicy-full", title: "勁辣雞腿堡超值餐", price: 178, items: ["spicy-chicken", "fries", "cola"], tag: "人氣" },
      { id: "combo-spicy-dessert", title: "勁辣雞腿堡甜點餐", price: 161, items: ["spicy-chicken", "apple-pie", "cola"], tag: "甜點" },
      { id: "combo-fries-drink", title: "薯條飲料輕享組", price: 93, items: ["fries", "cola"], tag: "小資" },
      { id: "combo-fries-dessert", title: "薯條甜點組", price: 93, items: ["fries", "apple-pie"], tag: "鹹甜" },
      { id: "combo-cola-dessert", title: "飲料甜點組", price: 76, items: ["cola", "apple-pie"], tag: "下午茶" },
      { id: "combo-cola-burger", title: "漢堡飲料組", price: 113, items: ["big-mac", "cola"], tag: "快速" },
      { id: "combo-apple-pie-drink", title: "蘋果派點心餐", price: 76, items: ["apple-pie", "cola"], tag: "點心" }
    ];

    const state = {
      selectedProductId: null
    };

    const elements = {
      visitCount: document.getElementById("visitCount"),
      itemsGrid: document.getElementById("itemsGrid"),
      comboResults: document.getElementById("comboResults"),
      selectedItemName: document.getElementById("selectedItemName"),
      clearButton: document.getElementById("clearButton"),
      backButton: document.getElementById("backButton"),
      selectionScreen: document.getElementById("selectionScreen"),
      comboScreen: document.getElementById("comboScreen")
    };

    function formatCurrency(value) {
      return `NT$${value}`;
    }

    function getSelectedProduct() {
      return products.find((product) => product.id === state.selectedProductId) || null;
    }

    function getMatchingCombos() {
      if (!state.selectedProductId) {
        return [];
      }

      return comboCatalog
        .filter((combo) => combo.items.includes(state.selectedProductId))
        .sort((a, b) => a.price - b.price);
    }

    function renderProducts() {
      elements.itemsGrid.innerHTML = products.map((product) => `
        <button class="item-card" type="button" data-product-id="${product.id}">
          <div class="item-icon">${product.icon}</div>
          <div class="item-name">${product.name}</div>
          <div class="item-price">${formatCurrency(product.price)}</div>
        </button>
      `).join("");
    }

    function renderCombos() {
      const selectedProduct = getSelectedProduct();
      const combos = getMatchingCombos();

      elements.selectedItemName.textContent = selectedProduct ? selectedProduct.name : "-";

      if (!selectedProduct || combos.length === 0) {
        elements.comboResults.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">目前沒有相關套餐</div>';
        return;
      }

      elements.comboResults.innerHTML = combos.map((combo, index) => {
        const includedNames = combo.items.map((itemId) => {
          const product = products.find((entry) => entry.id === itemId);
          return product ? product.name : itemId;
        });

        return `
          <article class="combo-card ${index === 0 ? "featured" : ""}">
            <div class="combo-top">
              <div class="combo-title">${combo.title}</div>
              <div class="combo-price">${formatCurrency(combo.price)}</div>
            </div>
            <div class="combo-tags">
              <span class="tag">${combo.tag}</span>
              ${index === 0 ? '<span class="tag">推薦</span>' : ""}
              ${includedNames.map((name) => `<span class="tag">${name}</span>`).join("")}
            </div>
          </article>
        `;
      }).join("");
    }

    function showScreen(screenName) {
      elements.selectionScreen.classList.toggle("active", screenName === "selection");
      elements.comboScreen.classList.toggle("active", screenName === "combo");
    }

    function selectProduct(productId) {
      state.selectedProductId = productId;
      renderCombos();
      showScreen("combo");
    }

    function clearSelection() {
      state.selectedProductId = null;
      showScreen("selection");
    }

    function renderVisitCount() {
      const counterKey = "mcd_local_visit_count";
      const sessionKey = "mcd_local_visit_recorded";
      const previousCount = Number(localStorage.getItem(counterKey) || "0");

      if (!sessionStorage.getItem(sessionKey)) {
        const nextCount = previousCount + 1;
        localStorage.setItem(counterKey, String(nextCount));
        sessionStorage.setItem(sessionKey, "1");
        elements.visitCount.textContent = nextCount.toLocaleString("zh-TW");
        return;
      }

      elements.visitCount.textContent = previousCount.toLocaleString("zh-TW");
    }

    function bindEvents() {
      document.querySelectorAll("[data-product-id]").forEach((button) => {
        button.addEventListener("click", () => {
          selectProduct(button.dataset.productId);
        });
      });

      elements.clearButton.addEventListener("click", clearSelection);
      elements.backButton.addEventListener("click", () => showScreen("selection"));
    }

    function init() {
      renderVisitCount();
      renderProducts();
      bindEvents();
      showScreen("selection");
    }

    init();
  </script>
</body>
</html>

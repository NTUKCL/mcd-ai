<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>麥當勞套餐推薦系統</title>
  <style>
    :root {
      --bg: #180904;
      --panel: rgba(58, 20, 8, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --accent: #ffbc0d;
      --accent-strong: #ff8b00;
      --text: #fff7e6;
      --muted: #f4d3a1;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      --glow: 0 0 0 1px rgba(255, 216, 91, 0.22), 0 12px 30px rgba(255, 164, 31, 0.16);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 188, 13, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 98, 40, 0.18), transparent 28%),
        linear-gradient(135deg, #120704 0%, #220d07 45%, #0d0604 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .panel {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 224, 143, 0.14);
      box-shadow: var(--shadow);
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hero {
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(255, 188, 13, 0.18), rgba(255, 77, 50, 0.12)),
        rgba(39, 14, 7, 0.92);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      letter-spacing: 0.02em;
    }

    .subhead {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .panel-header,
    .panel-body {
      padding: 22px;
    }

    .panel-header {
      padding-bottom: 0;
    }

    .panel-title {
      font-size: 1.15rem;
      color: #fff3d1;
    }

    .toolbar,
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar {
      margin-bottom: 18px;
    }

    .actions {
      margin-bottom: 18px;
    }

    .selected-pill {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffe8b7;
      font-weight: 700;
    }

    .items-grid,
    .combo-grid,
    .sweet-card-grid {
      display: grid;
      gap: 14px;
    }

    .items-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .combo-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .sweet-card-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }

    .item-card,
    .combo-card,
    .sweet-card {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-soft);
      transition: transform var(--transition), filter var(--transition), border-color var(--transition);
    }

    .item-card {
      cursor: pointer;
      padding: 16px 14px 18px;
      text-align: center;
      min-height: 240px;
    }

    .item-card:hover,
    .combo-card:hover,
    .sweet-card:hover,
    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .item-card.selected,
    .sweet-card.selected,
    .combo-card.featured {
      background: linear-gradient(180deg, rgba(255, 218, 97, 0.18), rgba(255, 125, 29, 0.14));
      border-color: rgba(255, 209, 92, 0.78);
      box-shadow: var(--glow);
    }

    .item-image-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 132px;
      margin-bottom: 12px;
    }

    .item-image {
      max-width: 118px;
      max-height: 118px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 16px 18px rgba(0, 0, 0, 0.28));
    }

    .item-name {
      font-size: 1.02rem;
      font-weight: 800;
      color: #fff7de;
    }

    .item-price {
      margin-top: 8px;
      color: #ffe7b3;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .combo-card,
    .sweet-card {
      padding: 18px;
    }

    .combo-top,
    .sweet-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .combo-title,
    .sweet-title {
      font-size: 1.04rem;
      color: #fff7de;
      font-weight: 800;
    }

    .combo-price,
    .sweet-price {
      color: #ffd05f;
      font-weight: 900;
      white-space: nowrap;
    }

    .combo-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tag {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffebbd;
      font-size: 0.88rem;
    }

    .sweet-copy {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.94rem;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 13px 18px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 0.96rem;
      transition: transform var(--transition), filter var(--transition);
    }

    .btn-primary {
      color: #4c2000;
      background: linear-gradient(180deg, #fff2b8 0%, #ffbc0d 52%, #e28a00 100%);
    }

    .btn-secondary {
      color: #fff4df;
      background: linear-gradient(180deg, #7d3218 0%, #4c1e0f 100%);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: none;
      transform: none;
    }

    .empty-state {
      padding: 18px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .items-grid,
      .combo-grid,
      .sweet-card-grid {
        grid-template-columns: 1fr;
      }

      .toolbar,
      .actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section id="selectionScreen" class="screen active">
      <section class="panel hero">
        <h1>請選擇想吃的品項</h1>
        <p class="subhead">可複選，完成後再進入下一步</p>
      </section>

      <div class="toolbar">
        <div class="selected-pill">已選 <span id="selectedCount">0</span> 項</div>
        <button class="btn btn-primary" id="nextButton" type="button" disabled>確認選擇</button>
      </div>

      <section class="panel">
        <div class="panel-body">
          <div id="itemsGrid" class="items-grid"></div>
        </div>
      </section>

      <section class="panel" style="margin-top: 20px;">
        <div class="panel-header">
          <h2 class="panel-title">甜心卡</h2>
        </div>
        <div class="panel-body">
          <div id="sweetCardGrid" class="sweet-card-grid"></div>
        </div>
      </section>
    </section>

    <section id="comboScreen" class="screen">
      <div class="toolbar">
        <div class="selected-pill">已選品項：<span id="selectedItemsText">-</span></div>
      </div>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">推薦套餐</h2>
        </div>
        <div class="panel-body">
          <div class="actions">
            <button class="btn btn-secondary" id="backButton" type="button">返回</button>
            <button class="btn btn-primary" id="resetButton" type="button">重新選擇</button>
          </div>
          <div id="comboResults" class="combo-grid"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const friesSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="fry" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#ffe897"/>
            <stop offset="100%" stop-color="#f5ba30"/>
          </linearGradient>
          <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#ff2b31"/>
            <stop offset="100%" stop-color="#d10915"/>
          </linearGradient>
        </defs>
        <rect width="220" height="220" fill="none"/>
        <g transform="translate(28 20)">
          <rect x="20" y="10" width="18" height="94" rx="8" fill="url(#fry)" transform="rotate(-6 29 57)"/>
          <rect x="38" y="2" width="18" height="106" rx="8" fill="url(#fry)" transform="rotate(2 47 55)"/>
          <rect x="58" y="14" width="18" height="92" rx="8" fill="url(#fry)" transform="rotate(-2 67 60)"/>
          <rect x="78" y="4" width="18" height="108" rx="8" fill="url(#fry)" transform="rotate(5 87 58)"/>
          <rect x="98" y="18" width="18" height="88" rx="8" fill="url(#fry)" transform="rotate(-3 107 62)"/>
          <rect x="118" y="0" width="18" height="108" rx="8" fill="url(#fry)" transform="rotate(7 127 54)"/>
          <rect x="138" y="14" width="18" height="92" rx="8" fill="url(#fry)" transform="rotate(-5 147 60)"/>
          <path d="M10 82 C42 58, 122 58, 154 82 L144 170 C128 182, 34 182, 18 170 Z" fill="url(#box)"/>
          <path d="M42 120 C58 106, 104 106, 120 120" fill="none" stroke="#ffcf17" stroke-width="8" stroke-linecap="round"/>
          <path d="M42 120 C42 102, 55 92, 67 92 C78 92, 88 102, 88 120" fill="none" stroke="#ffcf17" stroke-width="8" stroke-linecap="round"/>
          <path d="M74 120 C74 102, 87 92, 99 92 C110 92, 120 102, 120 120" fill="none" stroke="#ffcf17" stroke-width="8" stroke-linecap="round"/>
        </g>
      </svg>
    `);

    const burgerSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <rect width="220" height="220" fill="none"/>
        <ellipse cx="110" cy="152" rx="78" ry="20" fill="#482314" opacity=".22"/>
        <path d="M50 96 C58 54, 162 54, 170 96 Z" fill="#f0b34a"/>
        <circle cx="82" cy="77" r="4" fill="#fff2bc"/>
        <circle cx="102" cy="69" r="4" fill="#fff2bc"/>
        <circle cx="122" cy="76" r="4" fill="#fff2bc"/>
        <circle cx="142" cy="69" r="4" fill="#fff2bc"/>
        <rect x="48" y="96" width="124" height="10" rx="5" fill="#5d311c"/>
        <rect x="44" y="106" width="132" height="16" rx="8" fill="#6b3e20"/>
        <rect x="50" y="118" width="120" height="10" rx="5" fill="#ffd93f"/>
        <rect x="48" y="128" width="124" height="11" rx="5" fill="#72a23a"/>
        <rect x="54" y="139" width="112" height="18" rx="9" fill="#e1a04d"/>
      </svg>
    `);

    const nuggetsSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <rect width="220" height="220" fill="none"/>
        <ellipse cx="110" cy="162" rx="76" ry="18" fill="#482314" opacity=".2"/>
        <rect x="54" y="110" width="112" height="46" rx="10" fill="#cf1318"/>
        <rect x="50" y="98" width="120" height="24" rx="10" fill="#f8f2db"/>
        <path d="M66 54 C76 42, 96 42, 102 58 C114 42, 136 45, 142 61 C150 56, 164 60, 168 74 C172 88, 160 101, 145 101 H84 C66 101, 55 88, 57 74 C59 63, 65 58, 66 54 Z" fill="#e8b256"/>
        <path d="M86 46 C96 36, 118 37, 126 52 C138 42, 157 48, 159 61" fill="none" stroke="#f8d68f" stroke-width="8" stroke-linecap="round"/>
      </svg>
    `);

    const colaSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <rect width="220" height="220" fill="none"/>
        <ellipse cx="110" cy="170" rx="62" ry="16" fill="#482314" opacity=".2"/>
        <path d="M78 40 H142 L132 156 C131 166, 124 174, 110 174 C96 174, 89 166, 88 156 Z" fill="#d91d24"/>
        <path d="M80 56 H140" stroke="#fff5da" stroke-width="8" stroke-linecap="round"/>
        <path d="M100 28 H144" stroke="#ffe897" stroke-width="8" stroke-linecap="round"/>
        <path d="M144 28 L128 54" stroke="#ffe897" stroke-width="8" stroke-linecap="round"/>
        <path d="M95 98 C103 88, 117 88, 125 98" fill="none" stroke="#ffd11b" stroke-width="8" stroke-linecap="round"/>
        <path d="M95 98 C95 87, 103 80, 110 80 C117 80, 125 87, 125 98" fill="none" stroke="#ffd11b" stroke-width="8" stroke-linecap="round"/>
      </svg>
    `);

    const pieSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <rect width="220" height="220" fill="none"/>
        <ellipse cx="110" cy="164" rx="72" ry="18" fill="#482314" opacity=".2"/>
        <path d="M56 118 L108 58 L164 112 L114 162 Z" fill="#e5a147"/>
        <path d="M66 118 L108 76 L152 112 L112 150 Z" fill="#f8c45c"/>
        <path d="M88 92 H122" stroke="#cc6f1a" stroke-width="7" stroke-linecap="round"/>
        <path d="M81 104 H130" stroke="#cc6f1a" stroke-width="7" stroke-linecap="round"/>
        <path d="M74 116 H138" stroke="#cc6f1a" stroke-width="7" stroke-linecap="round"/>
      </svg>
    `);

    const sweetCardSvg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="c1" x1="0" x2="1">
            <stop offset="0%" stop-color="#ff5d6c"/>
            <stop offset="100%" stop-color="#ffbc0d"/>
          </linearGradient>
        </defs>
        <rect width="220" height="220" fill="none"/>
        <rect x="30" y="52" width="160" height="110" rx="18" fill="url(#c1)"/>
        <rect x="30" y="74" width="160" height="20" fill="rgba(255,255,255,.22)"/>
        <text x="110" y="128" text-anchor="middle" fill="#fff7de" font-size="30" font-family="Segoe UI, sans-serif" font-weight="700">甜心卡</text>
      </svg>
    `);

    const products = [
      { id: "nuggets", name: "麥克雞塊", price: 99, image: `data:image/svg+xml;charset=UTF-8,${nuggetsSvg}` },
      { id: "big-mac", name: "大麥克", price: 75, image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}` },
      { id: "spicy-chicken", name: "勁辣雞腿堡", price: 85, image: `data:image/svg+xml;charset=UTF-8,${burgerSvg}` },
      { id: "fries", name: "薯條", price: 55, image: `data:image/svg+xml;charset=UTF-8,${friesSvg}` },
      { id: "cola", name: "可樂", price: 38, image: `data:image/svg+xml;charset=UTF-8,${colaSvg}` },
      { id: "apple-pie", name: "蘋果派", price: 38, image: `data:image/svg+xml;charset=UTF-8,${pieSvg}` }
    ];

    const comboCatalog = [
      { id: "combo-nuggets-classic", title: "雞塊經典套餐", price: 192, items: ["nuggets", "fries", "cola"] },
      { id: "combo-nuggets-share", title: "雞塊加量分享餐", price: 237, items: ["nuggets", "cola", "apple-pie"] },
      { id: "combo-nuggets-light", title: "雞塊輕鬆配", price: 137, items: ["nuggets", "cola"] },
      { id: "combo-bigmac-classic", title: "大麥克經典套餐", price: 168, items: ["big-mac", "fries", "cola"] },
      { id: "combo-bigmac-snack", title: "大麥克點心餐", price: 113, items: ["big-mac", "cola"] },
      { id: "combo-spicy-full", title: "勁辣雞腿堡超值餐", price: 178, items: ["spicy-chicken", "fries", "cola"] },
      { id: "combo-spicy-dessert", title: "勁辣雞腿堡甜點餐", price: 161, items: ["spicy-chicken", "apple-pie", "cola"] },
      { id: "combo-fries-drink", title: "薯條飲料輕享組", price: 93, items: ["fries", "cola"] },
      { id: "combo-fries-dessert", title: "薯條甜點組", price: 93, items: ["fries", "apple-pie"] },
      { id: "combo-cola-dessert", title: "飲料甜點組", price: 76, items: ["cola", "apple-pie"] },
      { id: "combo-cola-burger", title: "漢堡飲料組", price: 113, items: ["big-mac", "cola"] },
      { id: "combo-apple-pie-drink", title: "蘋果派點心餐", price: 76, items: ["apple-pie", "cola"] }
    ];

    const sweetCardOptions = [
      { id: "dessert-card", title: "甜心卡加購", price: 39, copy: "可搭配常用買 A 送 B 優惠", image: `data:image/svg+xml;charset=UTF-8,${sweetCardSvg}` },
      { id: "dessert-card-bundle", title: "甜心卡套餐搭配", price: 69, copy: "適合需要常態優惠的點餐方式", image: `data:image/svg+xml;charset=UTF-8,${sweetCardSvg}` }
    ];

    const state = {
      selectedProductIds: new Set(),
      selectedSweetCardId: null
    };

    const elements = {
      selectedCount: document.getElementById("selectedCount"),
      nextButton: document.getElementById("nextButton"),
      itemsGrid: document.getElementById("itemsGrid"),
      sweetCardGrid: document.getElementById("sweetCardGrid"),
      comboResults: document.getElementById("comboResults"),
      selectedItemsText: document.getElementById("selectedItemsText"),
      backButton: document.getElementById("backButton"),
      resetButton: document.getElementById("resetButton"),
      selectionScreen: document.getElementById("selectionScreen"),
      comboScreen: document.getElementById("comboScreen")
    };

    function formatCurrency(value) {
      return `NT$${value}`;
    }

    function getSelectedProducts() {
      return products.filter((product) => state.selectedProductIds.has(product.id));
    }

    function getMatchingCombos() {
      if (state.selectedProductIds.size === 0) {
        return [];
      }

      return comboCatalog
        .filter((combo) => [...state.selectedProductIds].every((itemId) => combo.items.includes(itemId)))
        .sort((a, b) => a.price - b.price);
    }

    function renderProducts() {
      elements.itemsGrid.innerHTML = products.map((product) => `
        <button class="item-card ${state.selectedProductIds.has(product.id) ? "selected" : ""}" type="button" data-product-id="${product.id}">
          <div class="item-image-wrap">
            <img class="item-image" src="${product.image}" alt="${product.name}">
          </div>
          <div class="item-name">${product.name}</div>
          <div class="item-price">${formatCurrency(product.price)}</div>
        </button>
      `).join("");
    }

    function renderSweetCards() {
      elements.sweetCardGrid.innerHTML = sweetCardOptions.map((option) => `
        <button class="sweet-card ${state.selectedSweetCardId === option.id ? "selected" : ""}" type="button" data-sweet-card-id="${option.id}">
          <div class="sweet-top">
            <div class="sweet-title">${option.title}</div>
            <div class="sweet-price">${formatCurrency(option.price)}</div>
          </div>
          <div class="item-image-wrap" style="height:104px; margin-bottom: 8px;">
            <img class="item-image" src="${option.image}" alt="${option.title}" style="max-height:96px;">
          </div>
          <div class="sweet-copy">${option.copy}</div>
        </button>
      `).join("");
    }

    function renderCombos() {
      const selectedProducts = getSelectedProducts();
      const combos = getMatchingCombos();
      const selectedNames = selectedProducts.map((product) => product.name);

      if (state.selectedSweetCardId) {
        const sweetCard = sweetCardOptions.find((option) => option.id === state.selectedSweetCardId);
        if (sweetCard) {
          selectedNames.push(sweetCard.title);
        }
      }

      elements.selectedItemsText.textContent = selectedNames.length ? selectedNames.join("、") : "-";

      if (combos.length === 0) {
        elements.comboResults.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">目前沒有符合這些品項的套餐</div>';
        return;
      }

      elements.comboResults.innerHTML = combos.map((combo, index) => {
        const includedNames = combo.items.map((itemId) => {
          const product = products.find((entry) => entry.id === itemId);
          return product ? product.name : itemId;
        });

        return `
          <article class="combo-card ${index === 0 ? "featured" : ""}">
            <div class="combo-top">
              <div class="combo-title">${combo.title}</div>
              <div class="combo-price">${formatCurrency(combo.price)}</div>
            </div>
            <div class="combo-tags">
              ${index === 0 ? '<span class="tag">推薦</span>' : ""}
              ${includedNames.map((name) => `<span class="tag">${name}</span>`).join("")}
            </div>
          </article>
        `;
      }).join("");
    }

    function updateSelectionSummary() {
      elements.selectedCount.textContent = state.selectedProductIds.size;
      elements.nextButton.disabled = state.selectedProductIds.size === 0;
    }

    function showScreen(screenName) {
      elements.selectionScreen.classList.toggle("active", screenName === "selection");
      elements.comboScreen.classList.toggle("active", screenName === "combo");
    }

    function toggleProduct(productId) {
      if (state.selectedProductIds.has(productId)) {
        state.selectedProductIds.delete(productId);
      } else {
        state.selectedProductIds.add(productId);
      }

      renderProducts();
      updateSelectionSummary();
      bindSelectionEvents();
    }

    function toggleSweetCard(optionId) {
      state.selectedSweetCardId = state.selectedSweetCardId === optionId ? null : optionId;
      renderSweetCards();
      bindSelectionEvents();
    }

    function goToComboScreen() {
      renderCombos();
      showScreen("combo");
    }

    function resetAll() {
      state.selectedProductIds.clear();
      state.selectedSweetCardId = null;
      renderProducts();
      renderSweetCards();
      updateSelectionSummary();
      bindSelectionEvents();
      showScreen("selection");
    }

    function bindSelectionEvents() {
      document.querySelectorAll("[data-product-id]").forEach((button) => {
        button.addEventListener("click", () => {
          toggleProduct(button.dataset.productId);
        });
      });

      document.querySelectorAll("[data-sweet-card-id]").forEach((button) => {
        button.addEventListener("click", () => {
          toggleSweetCard(button.dataset.sweetCardId);
        });
      });
    }

    function bindGlobalEvents() {
      elements.nextButton.addEventListener("click", goToComboScreen);
      elements.backButton.addEventListener("click", () => showScreen("selection"));
      elements.resetButton.addEventListener("click", resetAll);
    }

    function init() {
      renderProducts();
      renderSweetCards();
      updateSelectionSummary();
      bindSelectionEvents();
      bindGlobalEvents();
      showScreen("selection");
    }

    init();
  </script>
</body>
</html>
